# Supabase local config — ports remapped to 7432x to avoid collision with other worktrees

[api]
enabled = true
port = 74321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 74322
major_version = 15

[studio]
enabled = true
port = 74323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 74324
smtp_port = 7425
pop3_port = 74110

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[analytics]
enabled = false
port = 74325
